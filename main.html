<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Selector</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c1220;
  --panel2:#0f1830;
  --text:#eaeaf2;
  --accent:#00aaff;
}

/* base */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color:var(--text);
}

/* language top bar */
.topbar{
  display:flex;
  justify-content:flex-end;
  padding:10px 16px;
}

.lang-select{
  width:auto;
  padding:6px 10px;
  font-size:12px;
  border-radius:8px;
  background:#000;
  color:#fff;
  border:1px solid var(--accent);
}

/* layout */
.container{
  padding:16px;
  max-width:900px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* cards */
.card{
  background: linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid rgba(0,170,255,0.25);
  border-radius:14px;
  padding:16px;
}

/* inputs */
select{
  width:100%;
  padding:12px;
  border-radius:10px;
  background:#000;
  color:#fff;
  border:1px solid var(--accent);
}

/* BUTTONS (RAZOR STYLE ON) */
button{
  width:100%;
  background:#000;
  color:#fff;
  border:1px solid var(--accent);
  padding:14px;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
  font-weight:bold;

  box-shadow:
    0 0 6px rgba(0,170,255,0.4),
    0 0 12px rgba(0,170,255,0.2);

  transition:all 0.12s ease;
}

button:hover{
  box-shadow:
    0 0 10px rgba(0,170,255,0.6),
    0 0 18px rgba(0,170,255,0.3);
}

button:active{
  transform:scale(0.96);
  box-shadow:
    0 0 16px rgba(0,170,255,0.9),
    0 0 28px rgba(0,170,255,0.5);
}

/* copy icon button */
.icon-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.icon-btn svg{
  width:16px;
  height:16px;
  fill:white;
}

/* lists */
ul,ol{padding-left:18px;}
li{margin-bottom:4px;}

</style>
</head>

<body>

<!-- top bar -->
<div class="topbar">
  <select id="langSelect" class="lang-select" onchange="changeLanguage()">
    <option value="en">EN</option>
    <option value="es">ES</option>
    <option value="nl">NL</option>
    <option value="de">DE</option>
    <option value="fr">FR</option>
    <option value="it">IT</option>
    <option value="pt">PT</option>
  </select>
</div>

<div class="container">

<!-- recipe select -->
<div class="card">
<h2>Select Recipe</h2>
<select id="recipeSelect" onchange="showRecipe()"></select>
</div>

<!-- recipe -->
<div class="card">
<h2>Recipe</h2>
<div id="recipeDisplay"></div>
</div>

<!-- grocery selection -->
<div class="card">
<h2>Select Recipes</h2>
<div id="recipeCheckboxes"></div>
<button onclick="generateGroceryList()">Generate Grocery List</button>
</div>

<!-- grocery list -->
<div class="card">
<h2>Grocery List</h2>
<div id="groceryList">No items yet</div>
</div>

</div>

<script>
let recipes = [];
let selectedRecipes = [];
let currentLang = "en";

/* load */
function loadRecipes(){
  fetch("recipes.json")
    .then(r=>r.json())
    .then(data=>{
      recipes=data;
      populateUI();
    });
}

/* UI */
function populateUI(){
  const select=document.getElementById("recipeSelect");
  select.innerHTML="";

  recipes.forEach((r,i)=>{
    const o=document.createElement("option");
    o.value=i;
    o.textContent=r.title[currentLang];
    select.appendChild(o);
  });

  renderCheckboxes();
  showRecipe();
}

/* recipe */
function showRecipe(){
  const r=recipes[document.getElementById("recipeSelect").value];

  document.getElementById("recipeDisplay").innerHTML=
  `<h3>${r.title[currentLang]}</h3>
   <h4>Ingredients</h4>
   <ul>${r.ingredients[currentLang].map(i=>`<li>${i}</li>`).join("")}</ul>
   <h4>Preparation</h4>
   <ol>${r.instructions[currentLang].map(i=>`<li>${i}</li>`).join("")}</ol>`;
}

/* checkboxes */
function renderCheckboxes(){
  const c=document.getElementById("recipeCheckboxes");
  c.innerHTML="";

  recipes.forEach((r,i)=>{
    const label=document.createElement("label");

    const cb=document.createElement("input");
    cb.type="checkbox";
    cb.onchange=e=>{
      if(e.target.checked) selectedRecipes.push(i);
      else selectedRecipes=selectedRecipes.filter(v=>v!==i);
    };

    label.appendChild(cb);
    label.append(" "+r.title[currentLang]);
    c.appendChild(label);
  });
}

/* language */
function changeLanguage(){
  currentLang=document.getElementById("langSelect").value;
  populateUI();
}

/* parse */
function parseIngredient(str){
  const parts=str.split(" ");
  const qty=parseFloat(parts[0]);

  if(!isNaN(qty)){
    return {name:parts.slice(2).join(" "),unit:parts[1]||"",qty:qty};
  }

  return {name:str,unit:"",qty:1};
}

/* grocery list */
function generateGroceryList(){
  if(selectedRecipes.length===0){
    document.getElementById("groceryList").innerText="No recipes selected";
    return;
  }

  const merged={};

  selectedRecipes.forEach(i=>{
    recipes[i].ingredients[currentLang].forEach(item=>{
      const p=parseIngredient(item);
      const key=p.name+"|"+p.unit;

      if(!merged[key]) merged[key]={name:p.name,unit:p.unit,qty:0};
      merged[key].qty+=p.qty;
    });
  });

  const list=Object.values(merged)
    .map(i=>`${i.qty} ${i.unit} ${i.name}`.trim());

  window.generatedText="Grocery List:\n"+list.join("\n");

  document.getElementById("groceryList").innerHTML=
    `<ul>${list.map(i=>`<li>${i}</li>`).join("")}</ul>
     <button class="icon-btn" onclick="copyList()">
       <svg viewBox="0 0 16 16">
         <path d="M0 4a2 2 0 0 1 2-2h6v2H2v10h10v-6h2v6a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4z"/>
         <path d="M5 0h6a2 2 0 0 1 2 2v6h-2V2H5V0z"/>
       </svg>
       Copy
     </button>`;
}

/* copy */
function copyList(){
  if(navigator.clipboard){
    navigator.clipboard.writeText(window.generatedText);
  }
}

/* init */
window.onload=loadRecipes;
</script>

</body>
</html>
