<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Selector</title>

<style>
:root{
  --bg:#07070c;
  --panel:#0f0f18;
  --panel2:#121225;
  --text:#eaeaf2;
  --accent:#00e5ff;
  --border:rgba(255,255,255,0.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at top,#14142a 0%,var(--bg) 60%);
  color:var(--text);
}

.container{
  padding:16px;
  max-width:900px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}

select, button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:var(--text);
  cursor:pointer;
  transition:all 0.15s ease;
}

button:active{
  transform:scale(0.96);
  box-shadow:0 0 0 3px rgba(0,229,255,0.2);
}

button:hover{
  border-color:var(--accent);
}

.icon-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.icon-btn svg{
  width:16px;
  height:16px;
  fill:currentColor;
}

label{
  display:block;
  margin:4px 0;
}

ul, ol{
  padding-left:18px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Select Recipe</h2>
<select id="recipeSelect" onchange="showRecipe()"></select>
</div>

<div class="card">
<h2>Recipe</h2>
<div id="recipeDisplay"></div>
</div>

<div class="card">
<h2>Select Recipes</h2>
<div id="recipeCheckboxes"></div>
<button onclick="generateGroceryList()">Generate Grocery List</button>
</div>

<div class="card">
<h2>Grocery List</h2>
<div id="groceryList"></div>
</div>

</div>

<script>
let selectedRecipes=[];

function loadRecipes(){
 fetch("recipes.json")
  .then(r=>r.json())
  .then(data=>{
    window.recipes=data;

    const select=document.getElementById("recipeSelect");
    data.forEach((r,i)=>{
      const o=document.createElement("option");
      o.value=i;
      o.textContent=r.title;
      select.appendChild(o);
    });

    renderCheckboxes();
    showRecipe();
  });
}

function showRecipe(){
  const r=window.recipes[document.getElementById("recipeSelect").value];

  document.getElementById("recipeDisplay").innerHTML=
  `<h3>${r.title}</h3>
   <p><b>Time:</b> ${r.time || "-"}</p>
   <p><b>Servings:</b> ${r.servings || "-"}</p>

   <h4>Ingredients</h4>
   <ul>${(r.ingredients || []).map(i=>`<li>${i}</li>`).join("")}</ul>

   <h4>Preparation</h4>
   <ol>${(r.instructions || []).map(i=>`<li>${i}</li>`).join("")}</ol>
  `;
}

function renderCheckboxes(){
  const c=document.getElementById("recipeCheckboxes");
  c.innerHTML="";

  window.recipes.forEach((r,i)=>{
    const label=document.createElement("label");

    const cb=document.createElement("input");
    cb.type="checkbox";

    cb.onchange=e=>{
      if(e.target.checked) selectedRecipes.push(i);
      else selectedRecipes=selectedRecipes.filter(v=>v!==i);
    };

    label.appendChild(cb);
    label.append(" "+r.title);
    c.appendChild(label);
  });
}

function parseIngredient(str){
  const parts=str.split(" ");
  const qty=parseFloat(parts[0]);

  if(!isNaN(qty)){
    return {
      name:parts.slice(2).join(" "),
      unit:parts[1]||"",
      qty:qty
    };
  }
  return {name:str,unit:"",qty:1};
}

function generateGroceryList(){
  if(selectedRecipes.length===0){
    document.getElementById("groceryList").innerHTML="<p>No recipes selected</p>";
    return;
  }

  const map={};

  selectedRecipes.forEach(i=>{
    window.recipes[i].ingredients.forEach(ing=>{
      const p=parseIngredient(ing);
      const key=p.name+"|"+p.unit;

      if(!map[key]) map[key]={...p};
      else map[key].qty+=p.qty;
    });
  });

  const items=Object.values(map).map(i=>{
    return `${i.qty} ${i.unit} ${i.name}`.trim();
  });

  window.generatedText="Grocery List:\n"+items.join("\n");

  document.getElementById("groceryList").innerHTML=
  `<ul>${items.map(i=>`<li>${i}</li>`).join("")}</ul>

   <button class="icon-btn" onclick="copyList()">
     <svg viewBox="0 0 16 16">
       <path d="M0 4a2 2 0 0 1 2-2h6v2H2v10h10v-6h2v6a2 2 0 0 1-2 2H2z"/>
       <path d="M5 0h6a2 2 0 0 1 2 2v6h-2V2H5z"/>
     </svg>
     Copy
   </button>`;
}

function copyList(){
  if(!window.generatedText) return;

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(window.generatedText);
  }else{
    const t=document.createElement("textarea");
    t.value=window.generatedText;
    document.body.appendChild(t);
    t.select();
    document.execCommand("copy");
    document.body.removeChild(t);
  }
}

window.onload=loadRecipes;
</script>

</body>
</html>
