<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery TO-DO Terminal</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c1220;
  --panel2:#0f1830;
  --text:#eaeaf2;
  --accent:#00aaff;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color:var(--text);
}

/* MOBILE-FIRST LAYOUT */
.container{
  padding:12px;
  max-width:900px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  background: linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid rgba(0,170,255,0.25);
  border-radius:14px;
  padding:14px;
}

/* title */
h1{
  margin:0;
  font-size:18px;
  color:var(--accent);
}

/* terminal */
.terminal{
  background:#000;
  border:1px solid var(--accent);
  border-radius:10px;
  padding:10px;
  font-family: monospace;
}

#cmdInput{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:#00ffcc;
  font-family: monospace;
  font-size:16px;
  padding:10px 0;
}

/* log */
.log{
  max-height:140px;
  overflow:auto;
  font-size:12px;
  color:#aaa;
  margin-top:8px;
}

/* todo */
.todo-item{
  display:flex;
  gap:10px;
  padding:8px 0;
  align-items:center;
  font-family: monospace;
  font-size:15px;
}

.todo-item input{
  transform:scale(1.4);
}

.done{
  text-decoration: line-through;
  opacity:0.5;
}

/* output */
.output{
  background:#000;
  border:1px solid var(--accent);
  padding:12px;
  border-radius:10px;
  font-size:13px;
  white-space:pre-wrap;
  font-family: monospace;
}

/* MOBILE OPTIMIZATION */
@media (max-width:600px){
  .container{ padding:8px; }
  .card{ padding:12px; }
  h1{ font-size:16px; }
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Grocery TO-DO Terminal</h1>
  </div>

  <div class="card">
    <h3>Terminal Input</h3>

    <div class="terminal">
      <div>> paste grocery list OR use commands</div>
      <div>> add / done / undone / clear / list</div>

      <input id="cmdInput" placeholder="Paste list or type command..." />
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="card">
    <h3>Grocery List</h3>
    <div id="todoList"></div>
  </div>

  <div class="card">
    <h3>Export</h3>
    <div id="output" class="output"></div>
  </div>

</div>

<script>
const KEY = "grocery_terminal_mobile";
let todos = [];

function log(msg){
  const box = document.getElementById("log");
  box.innerHTML += msg + "<br>";
  box.scrollTop = box.scrollHeight;
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(todos));
  render();
  renderOutput();
}

function load(){
  const data = localStorage.getItem(KEY);
  if(data) todos = JSON.parse(data);
  render();
  renderOutput();
}

/* MULTILINE PARSER (KEY FEATURE) */
function addFromLines(text){
  const lines = text
    .split("\n")
    .map(l => l.trim())
    .filter(l => l.length > 0);

  lines.forEach(line => {
    todos.push({ text: line, done:false });
  });

  log("Added " + lines.length + " items");
  save();
}

function runCommand(cmd){
  const trimmed = cmd.trim();

  if(trimmed.startsWith("add ")){
    addFromLines(trimmed.replace("add ",""));
    return;
  }

  if(trimmed === "clear"){
    todos = [];
    log("Cleared list");
    save();
    return;
  }

  if(trimmed === "list"){
    todos.forEach((t,i)=>{
      log((i+1)+". "+(t.done?"[x] ":"[ ] ")+t.text);
    });
    return;
  }

  if(trimmed.startsWith("done ")){
    const i = parseInt(trimmed.split(" ")[1]) - 1;
    if(todos[i]) todos[i].done = true;
    save();
    return;
  }

  if(trimmed.startsWith("undone ")){
    const i = parseInt(trimmed.split(" ")[1]) - 1;
    if(todos[i]) todos[i].done = false;
    save();
    return;
  }

  log("Unknown command");
}

/* INPUT HANDLER */
const input = document.getElementById("cmdInput");

/* ENTER HANDLER */
input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    const value = input.value;

    if(value.includes("\n")){
      addFromLines(value);
    } else if(value.includes("\n") || value.includes("1 ") || value.includes("kg")) {
      addFromLines(value);
    } else {
      runCommand(value);
    }

    input.value = "";
  }
});

/* PASTE HANDLER (IMPORTANT FOR MOBILE) */
input.addEventListener("paste", e=>{
  const text = (e.clipboardData || window.clipboardData).getData("text");

  if(text.includes("\n")){
    e.preventDefault();
    addFromLines(text);
    input.value = "";
  }
});

function render(){
  const box = document.getElementById("todoList");
  box.innerHTML = "";

  todos.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className = "todo-item";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = t.done;

    cb.onchange = () => {
      todos[i].done = cb.checked;
      save();
    };

    const label = document.createElement("span");
    label.textContent = (i+1)+". "+t.text;
    if(t.done) label.classList.add("done");

    div.appendChild(cb);
    div.appendChild(label);
    box.appendChild(div);
  });
}

function renderOutput(){
  let out = "";
  todos.forEach((t,i)=>{
    out += (t.done?"[x] ":"[ ] ")+(i+1)+" "+t.text+"\n";
  });

  document.getElementById("output").innerText = out;
}

load();
</script>

</body>
</html>
