<!doctype html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
html,body{margin:0;height:100%;background:#000}
canvas{width:100vw;height:100vh;display:block}
</style>
</head>
<body>
<canvas id="gl"></canvas><script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl');

canvas.width = innerWidth;
canvas.height = innerHeight;
gl.viewport(0,0,canvas.width,canvas.height);

// ---- SHADERS ----
const vs = `
attribute vec2 p;
varying vec2 uv;
void main(){
  uv = (p+1.0)*0.5;
  gl_Position = vec4(p,0.0,1.0);
}`;

const fs = `
precision mediump float;
uniform sampler2D cam;
varying vec2 uv;

float box(vec2 p, vec2 b){
  vec2 d = abs(p) - b;
  return length(max(d,0.0)) + min(max(d.x,d.y),0.0);
}

void main(){
  vec4 col = texture2D(cam, uv);

  vec2 center = vec2(0.5, 0.5);
  vec2 size = vec2(0.25, 0.12);

  float d = box(uv - center, size);

  if(d < 0.0){
    col = mix(col, vec4(0.0,1.0,0.0,1.0), 0.3);
  }

  gl_FragColor = col;
}`;

function shader(type,src){
  const s = gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  console.log(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, shader(gl.VERTEX_SHADER,vs));
gl.attachShader(prog, shader(gl.FRAGMENT_SHADER,fs));
gl.linkProgram(prog);
console.log(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

// ---- QUAD ----
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
  -1,-1, 1,-1, -1,1, 1,1
]), gl.STATIC_DRAW);

const loc = gl.getAttribLocation(prog,'p');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

// ---- TEXTURE ----
const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);

gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);

const uCam = gl.getUniformLocation(prog,'cam');
gl.uniform1i(uCam, 0);

// ---- VIDEO ----
const video = document.createElement('video');
video.autoplay = true;
video.muted = true;
video.playsInline = true;

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream=>{
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    requestAnimationFrame(draw);
  };

}).catch(err=>{
  alert("Camera error: " + err.message);
});

// ---- RENDER ----
function draw(){
  if(video.readyState >= 2){
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA,
                  gl.RGBA, gl.UNSIGNED_BYTE, video);
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(draw);
}
</script></body>
</html>
