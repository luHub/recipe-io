<!doctype html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>html,body{margin:0;height:100%;background:#000}canvas{width:100vw;height:100vh;display:block}</style>
</head>
<body>
<canvas id="gl"></canvas>
<script>
const gl = document.getElementById('gl').getContext('webgl');function resize(){ gl.canvas.width = innerWidth; gl.canvas.height = innerHeight; gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight); } addEventListener('resize',resize);resize();

const vs=attribute vec2 p;varying vec2 uv;void main(){uv=(p+1.)*.5;gl_Position=vec4(p,0,1);} ;

// signed distance box floatBox = float box(vec2 p, vec2 b){vec2 d=abs(p)-b;return length(max(d,0.))+min(max(d.x,d.y),0.);} ;

// simple SDF text (very minimal "TRACKING") const fs=`precision mediump float;uniform sampler2D cam;varying vec2 uv;${floatBox}

float charT(vec2 p){return box(p-vec2(0.,0.3),vec2(0.5,0.1))+box(p-vec2(0.,-0.2),vec2(0.1,0.5));} float charR(vec2 p){return box(p,vec2(0.1,0.6))+box(p-vec2(0.2,0.4),vec2(0.3,0.2));} float charA(vec2 p){return box(p-vec2(0.,0.2),vec2(0.4,0.1))+box(p-vec2(0.,-0.2),vec2(0.1,0.5));}

float text(vec2 p){ float d=1e5; p*=5.; d=min(d,charT(p-vec2(-2.,0.))); d=min(d,charR(p-vec2(-1.,0.))); d=min(d,charA(p-vec2(0.,0.))); return d; }

void main(){ vec4 col=texture2D(cam,uv);

// center box vec2 center=vec2(.5,.5); vec2 size=vec2(.2,.1); float d=box(uv-center,size);

if(d<0.){ col=mix(col,vec4(0.,1.,0.,1.),0.2);

vec2 local=(uv-center)/size; float td=text(local); float alpha=smoothstep(0.02,0.0,td); col=mix(col,vec4(0.,1.,0.,1.),alpha); }

gl_FragColor=col; }`;

function sh(t,s){let x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);return x} let pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);gl.useProgram(pr);

let buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW); let loc=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

let tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);

let video=document.createElement('video');video.autoplay=true;video.playsInline=true;

navigator.mediaDevices.getUserMedia({video:true}).then(s=>{ video.srcObject=s;video.play();requestAnimationFrame(draw); });

function draw(){ if(video.readyState>=2){ gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,video); } gl.drawArrays(gl.TRIANGLE_STRIP,0,4); requestAnimationFrame(draw); } </script>

</body>
</html>
